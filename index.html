<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-Powered Digital Twin of India's Climate — Real-time monitoring, AI forecasting, and advanced simulation for national-level climate intelligence." />
  <meta name="theme-color" content="#0B1020" />
  <meta name="author" content="ISRO × AI Climate Initiative" />
  <meta property="og:title" content="Climate Digital Twin — India" />
  <meta property="og:description" content="Real-time climate monitoring, AI-driven forecasting, and digital twin simulation powered by satellite intelligence." />
  <meta property="og:type" content="website" />
  <title>Climate Digital Twin — AI-Powered Climate Intelligence for India</title>

  <!-- Preload Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/landing.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/predictions.css" />
  <link rel="stylesheet" href="css/simulation.css" />
  <link rel="stylesheet" href="css/alerts.css" />
  <link rel="stylesheet" href="css/analytics.css" />
  <link rel="stylesheet" href="css/assistant.css" />
  <link rel="stylesheet" href="css/location-explorer.css" />
  <link rel="stylesheet" href="css/twin.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>" />
</head>
<body>

  <!-- ════════════════════════════════════════════════════
       Navigation Bar
       ════════════════════════════════════════════════════ -->
  <nav class="nav-bar nav-transparent" id="main-nav">
    <a class="nav-logo" href="#" onclick="event.preventDefault(); App.navigate('landing')">
      <div class="logo-icon">CT</div>
      <span class="hide-mobile">Climate Twin</span>
    </a>

    <div class="nav-links" id="nav-links">
      <a class="nav-link active" data-page="landing" href="#">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </span>
      </a>
      <a class="nav-link" data-page="dashboard" href="#">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
          Dashboard
        </span>
      </a>
      <a class="nav-link" data-page="predictions" href="#">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2z"/></svg>
          AI Predictions
        </span>
      </a>
      <a class="nav-link" data-page="simulation" href="#">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Simulation
        </span>
      </a>
      <a class="nav-link" data-page="twin" href="#">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Climate Twin
        </span>
      </a>
      <a class="nav-link" data-page="alerts" href="#">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Alerts
        </span>
      </a>
      <a class="nav-link" data-page="analytics" href="#">
        <span style="display:inline-flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
          Analytics
        </span>
      </a>
    </div>

    <div class="nav-actions">
      <div class="nav-status hide-mobile">
        <span id="system-time">00:00:00 IST</span>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ════════════════════════════════════════════════════
       Main Application
       ════════════════════════════════════════════════════ -->
  <main id="app">
    <section id="page-landing" class="page-section active"></section>
    <section id="page-dashboard" class="page-section"></section>
    <section id="page-predictions" class="page-section"></section>
    <section id="page-simulation" class="page-section"></section>
    <section id="page-twin" class="page-section"></section>
    <section id="page-alerts" class="page-section"></section>
    <section id="page-analytics" class="page-section"></section>
  </main>

  <!-- ════════════════════════════════════════════════════
       AI Assistant
       ════════════════════════════════════════════════════ -->
  <button id="ai-assistant-btn" onclick="App.toggleAssistant()" aria-label="AI Assistant">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <aside id="ai-assistant-panel">
    <div class="assistant-header">
      <div class="assistant-title">
        <span class="ai-dot"></span>
        AI Climate Assistant
      </div>
      <button class="close-btn" onclick="App.toggleAssistant()" aria-label="Close assistant">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="assistant-messages" id="assistant-messages"></div>

    <div class="assistant-chips">
      <button class="assistant-chip" data-query="What is the current weather?">🌡️ Weather</button>
      <button class="assistant-chip" data-query="What is the flood risk?">🌊 Flood Risk</button>
      <button class="assistant-chip" data-query="Tell me about the heatwave">🔥 Heatwave</button>
      <button class="assistant-chip" data-query="Show rainfall statistics">🌧️ Rainfall</button>
      <button class="assistant-chip" data-query="What is the air quality?">💨 AQI</button>
    </div>

    <div class="assistant-input">
      <input type="text" placeholder="Ask about climate data..." aria-label="Type your question" />
      <button class="assistant-send-btn" aria-label="Send message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </aside>

  <!-- ════════════════════════════════════════════════════
       Toast Container
       ════════════════════════════════════════════════════ -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ════════════════════════════════════════════════════
       Scripts (order matters: utilities first, then pages, then app)
       ════════════════════════════════════════════════════ -->
  <script src="js/animations.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/components.js"></script>
  <script src="js/india-map.js"></script>
  <script src="js/location-data.js"></script>
  <script src="js/weather-api.js"></script>
  <script src="js/location-explorer.js"></script>
  <script src="js/landing.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/predictions.js"></script>
  <script src="js/simulation.js"></script>
  <script src="js/twin.js"></script>
  <script src="js/alerts.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/assistant.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
